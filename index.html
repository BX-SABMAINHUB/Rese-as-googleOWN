<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Dueño</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; display:flex; height:100vh; }
    .login-container { margin:auto; background:#1e293b; padding:2rem; border-radius:1rem; width:350px; box-shadow:0 25px 50px -12px #000; }
    .login-container h2 { margin-bottom:1.5rem; }
    .login-container input, .login-container button { width:100%; padding:0.75rem; margin:0.5rem 0; border-radius:0.5rem; border:none; font-size:1rem; }
    .login-container input { background:#0f172a; color:white; border:1px solid #334155; }
    .login-container button { background:#3b82f6; color:white; font-weight:600; cursor:pointer; }
    .panel { display:flex; width:100%; }
    .sidebar { width:250px; background:#1e293b; padding:1rem; border-right:1px solid #334155; overflow-y:auto; }
    .sidebar h3 { margin-bottom:1rem; }
    .user-item { padding:0.6rem 1rem; margin-bottom:0.3rem; background:#0f172a; border-radius:0.5rem; cursor:pointer; transition:0.2s; }
    .user-item:hover { background:#334155; }
    .user-item.active { background:#3b82f6; }
    .main { flex:1; padding:2rem; overflow-y:auto; }
    .detail-card { background:#1e293b; padding:1.5rem; border-radius:1rem; margin-bottom:1rem; }
    .detail-card h3 { margin-bottom:1rem; }
    .balance-control { display:flex; gap:1rem; align-items:center; margin:1rem 0; }
    .balance-control input { width:120px; padding:0.5rem; background:#0f172a; color:white; border:1px solid #334155; border-radius:0.5rem; }
    .review-item { background:#0f172a; padding:0.75rem; margin:0.5rem 0; border-radius:0.5rem; display:flex; justify-content:space-between; align-items:center; }
    .review-actions button { margin-left:0.5rem; padding:0.4rem 0.8rem; border:none; border-radius:0.3rem; cursor:pointer; font-weight:600; }
    .approve { background:#22c55e; color:white; }
    .reject { background:#ef4444; color:white; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <!-- Login del dueño -->
  <div id="loginPanel" class="login-container">
    <h2>Acceso Dueño</h2>
    <input type="email" id="ownerEmail" placeholder="Correo" value="owner@gmail.com">
    <input type="password" id="ownerPass" placeholder="Contraseña" value="Owner">
    <button id="ownerLogin">Iniciar sesión</button>
  </div>

  <!-- Panel completo -->
  <div id="dashboard" class="panel hidden">
    <div class="sidebar">
      <h3>👥 Usuarios</h3>
      <div id="userList"></div>
    </div>
    <div class="main" id="detailArea">
      <p>Selecciona un usuario para ver detalles.</p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
      authDomain: "kahoot-8529e.firebaseapp.com",
      databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
      projectId: "kahoot-8529e",
      storageBucket: "kahoot-8529e.firebasestorage.app",
      messagingSenderId: "313414356056",
      appId: "1:313414356056:web:4aab4587f7df9393008e2d",
      measurementId: "G-8T4CPC1BQ3"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const loginPanel = document.getElementById('loginPanel');
    const dashboard = document.getElementById('dashboard');
    const ownerLoginBtn = document.getElementById('ownerLogin');
    const userListDiv = document.getElementById('userList');
    const detailArea = document.getElementById('detailArea');

    let selectedUserId = null;

    ownerLoginBtn.addEventListener('click', async () => {
      const email = document.getElementById('ownerEmail').value.trim();
      const pass = document.getElementById('ownerPass').value;
      if (email !== 'owner@gmail.com' || pass !== 'Owner') {
        alert('Credenciales incorrectas');
        return;
      }
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) {
        // Si el usuario no existe, lo creamos automáticamente (solo primera vez)
        if (e.code === 'auth/user-not-found') {
          await auth.createUserWithEmailAndPassword(email, pass);
        } else {
          alert('Error: ' + e.message);
        }
      }
    });

    auth.onAuthStateChanged(user => {
      if (user && user.email === 'owner@gmail.com') {
        loginPanel.classList.add('hidden');
        dashboard.classList.remove('hidden');
        cargarUsuarios();
      } else {
        loginPanel.classList.remove('hidden');
        dashboard.classList.add('hidden');
        if (user) auth.signOut(); // si no es owner, cerrar sesión
      }
    });

    async function cargarUsuarios() {
      const usersSnap = await db.ref('users').once('value');
      const users = usersSnap.val() || {};
      userListDiv.innerHTML = '';
      Object.entries(users).forEach(([uid, data]) => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.textContent = data.shortId || uid.slice(0,3);
        div.addEventListener('click', () => seleccionarUsuario(uid, data));
        userListDiv.appendChild(div);
      });
    }

    function seleccionarUsuario(uid, userData) {
      selectedUserId = uid;
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      mostrarDetalle(uid, userData);
    }

    async function mostrarDetalle(uid, userData) {
      const reviewsSnap = await db.ref('reviews').orderByChild('userId').equalTo(uid).once('value');
      const reviews = reviewsSnap.val() || {};
      const pendingReviews = Object.entries(reviews).filter(([key, val]) => val.status === 'pending');

      let html = `
        <div class="detail-card">
          <h3>Usuario: ${userData.shortId || uid.slice(0,3)}</h3>
          <p>📧 ${userData.email}</p>
          <p>📝 Reseñas enviadas totales: <strong>${userData.reviewCount || 0}</strong></p>
          <p>💰 Saldo actual: <strong>${userData.balance.toFixed(2)} €</strong></p>
          <div class="balance-control">
            <input type="number" id="amountInput" placeholder="Cantidad" step="0.01">
            <button onclick="modificarSaldo('${uid}', 'add')">➕ Añadir</button>
            <button onclick="modificarSaldo('${uid}', 'subtract')">➖ Quitar</button>
            <button onclick="modificarSaldo('${uid}', 'set')">📌 Establecer</button>
          </div>
        </div>
        <div class="detail-card">
          <h3>📋 Reseñas pendientes (${pendingReviews.length})</h3>
          ${pendingReviews.length === 0 ? '<p>No hay reseñas pendientes</p>' : ''}
          ${pendingReviews.map(([reviewId, review]) => `
            <div class="review-item">
              <span style="word-break:break-all;">🔗 ${review.link}</span>
              <div class="review-actions">
                <button class="approve" onclick="aprobarResena('${reviewId}', '${uid}')">✅ Aprobar</button>
                <button class="reject" onclick="rechazarResena('${reviewId}', '${uid}')">❌ Rechazar</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      detailArea.innerHTML = html;
    }

    window.modificarSaldo = async function(uid, action) {
      const amount = parseFloat(document.getElementById('amountInput').value);
      if (isNaN(amount) && action !== 'set') return alert('Introduce una cantidad válida');
      const userRef = db.ref('users/' + uid);
      const snap = await userRef.once('value');
      const data = snap.val();
      let newBalance = data.balance || 0;
      if (action === 'add') newBalance += amount;
      else if (action === 'subtract') newBalance = Math.max(0, newBalance - amount);
      else if (action === 'set') newBalance = amount;
      await userRef.update({ balance: newBalance });
      alert('Saldo actualizado');
      seleccionarUsuario(uid, {...data, balance: newBalance});
    };

    window.aprobarResena = async function(reviewId, uid) {
      await db.ref('reviews/' + reviewId).update({ status: 'approved' });
      const userRef = db.ref('users/' + uid);
      const snap = await userRef.once('value');
      const data = snap.val();
      const newBalance = (data.balance || 0) + 0.40;
      const newCount = (data.reviewCount || 0) + 1;
      await userRef.update({ balance: newBalance, reviewCount: newCount });
      alert('Reseña aprobada (+0,40€)');
      mostrarDetalle(uid, {...data, balance: newBalance, reviewCount: newCount});
    };

    window.rechazarResena = async function(reviewId, uid) {
      await db.ref('reviews/' + reviewId).update({ status: 'rejected' });
      const userRef = db.ref('users/' + uid);
      await userRef.update({ balance: 0, lastRejected: true });
      alert('Reseña rechazada. El saldo del usuario se ha puesto a 0€ y recibirá una notificación.');
      const snap = await userRef.once('value');
      mostrarDetalle(uid, snap.val());
    };
  </script>
</body>
</html>
